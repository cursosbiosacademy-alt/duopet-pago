document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"4eefbdc9-7b07-440d-a91d-24eb6d521d7e\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Nunito';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"1b8ee71d-bba1-4c68-9f55-53d77b6ba0ed\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    --page:#E7EAF1;\n    --surface:#FFFFFF;\n    --ink:#16233E;\n    --ink-2:#5A6478;\n    --ink-3:#97A0B0;\n    --line:#EAECF2;\n    --line-2:#E1E4EC;\n    --primary:#2746E0;\n    --primary-deep:#1C36C2;\n    --primary-soft:#EFF2FF;\n    --primary-border:#D3DCFF;\n    --green:#1EA85A;\n    --green-soft:#E9F7EE;\n    --green-border:#C9E9D4;\n    --amber-bg:#FCF6E2;\n    --amber-border:#F0E1AC;\n    --amber-ink:#8A6A1B;\n    --wa:#25D366;\n    --wa-deep:#1EBE5B;\n    --radius:18px;\n    --shadow:0 1px 2px rgba(22,35,62,.04), 0 10px 26px -16px rgba(22,35,62,.28);\n  }\n  *{box-sizing:border-box;}\n  html,body{margin:0;padding:0;}\n  body{\n    font-family:\"Nunito\", ui-rounded, \"Segoe UI\", system-ui, sans-serif;\n    background:var(--page);\n    color:var(--ink);\n    -webkit-font-smoothing:antialiased;\n    text-rendering:optimizeLegibility;\n  }\n  .shell{\n    max-width:472px;\n    margin:0 auto;\n    min-height:100dvh;\n    background:var(--surface);\n    box-shadow:0 0 0 1px rgba(22,35,62,.04), 0 24px 60px -30px rgba(22,35,62,.3);\n  }\n\n  /* ===== header ===== */\n  .topbar{\n    position:sticky;top:0;z-index:20;\n    background:rgba(255,255,255,.92);\n    backdrop-filter:saturate(140%) blur(8px);\n    -webkit-backdrop-filter:saturate(140%) blur(8px);\n    border-bottom:1px solid var(--line);\n    display:flex;align-items:center;justify-content:space-between;\n    padding:12px 18px;\n  }\n  .topbar__logo{height:34px;width:auto;display:block;}\n  .pill-secure{\n    display:inline-flex;align-items:center;gap:6px;\n    border:1.4px solid var(--green-border);\n    background:var(--green-soft);color:#15803d;\n    font-weight:800;font-size:12.5px;\n    padding:6px 11px 6px 9px;border-radius:999px;white-space:nowrap;\n  }\n  .pill-secure svg{width:13px;height:13px;}\n\n  /* ===== layout ===== */\n  .wrap{padding:24px 18px calc(30px + env(safe-area-inset-bottom));}\n  section{margin-top:26px;}\n  .kicker{\n    font-size:11.5px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;\n    color:var(--ink-3);margin:0 0 6px;\n  }\n  .h2{font-size:21px;font-weight:900;letter-spacing:-.01em;color:var(--ink);margin:0;line-height:1.2;}\n\n  /* ===== hero ===== */\n  .hero{text-align:center;margin-top:30px;}\n  .hero__kicker{font-size:11.5px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--ink-3);margin:0 0 12px;}\n  .hero__title{font-size:29px;line-height:1.18;font-weight:900;letter-spacing:-.02em;color:var(--ink);margin:0;text-wrap:balance;}\n  .hero__sub{font-size:15.5px;line-height:1.5;font-weight:600;color:var(--ink-2);margin:12px auto 0;max-width:34ch;text-wrap:pretty;}\n\n  /* ===== card base ===== */\n  .card{\n    background:var(--surface);\n    border:1px solid var(--line-2);\n    border-radius:var(--radius);\n    box-shadow:var(--shadow);\n  }\n\n  /* ===== price card ===== */\n  .price{margin-top:22px;padding:0;overflow:hidden;}\n  .price__top{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:20px 20px 18px;}\n  .price__label{font-size:14px;font-weight:700;color:var(--ink-2);line-height:1.35;}\n  .price__amt{display:flex;align-items:baseline;gap:4px;}\n  .price__num{font-size:38px;font-weight:900;letter-spacing: ================================ */\n(function(){\n  const completo = CONFIG.precioCompleto;\n  const apartado = CONFIG.montoApartado;\n  const restante = Math.max(0, completo - apartado);\n  const money    = n => '$' + Number(n).toLocaleString('es-MX');\n  const moneyMxn = n => money(n) + ' MXN';\n\n  const setAll = (sel, val) => document.querySelectorAll(sel).forEach(e => e.textContent = val);\n  setAll('.js-completo',      money(completo));\n  setAll('.js-completo-mxn',  moneyMxn(completo));\n  setAll('.js-apartado',      money(apartado));\n  setAll('.js-apartado-mxn',  moneyMxn(apartado));\n  setAll('.js-restante',      money(restante));\n  setAll('.js-restante-mxn',  moneyMxn(restante));\n\n  const setLink = (sel, url) => document.querySelectorAll(sel).forEach(a => { a.setAttribute('href', url && url.trim() ? url : '#'); });\n  setLink('.link-completo', CONFIG.links.pagarCompleto);\n  setLink('.link-apartar',  CONFIG.links.apartar);\n  setLink('.link-restante', CONFIG.links.completarRestante);\n  setLink('.link-wa',       CONFIG.whatsapp);\n\n  // bank values + copy targets\n  const b = CONFIG.banco;\n  const put = (sel, val) => { const el = document.querySelector(sel); if (el) el.textContent = val; };\n  put('.bank-titular', b.titular);\n  put('.bank-clabe',   b.clabe);\n  put('.bank-cuenta',  b.cuenta);\n  put('.bank-tarjeta', b.tarjeta);\n\n  const copyMap = [\n    ['CLABE',  b.clabe],\n    ['cuenta', b.cuenta],\n    ['tarjeta', b.tarjeta.replace(/\\s+/g,'')]\n  ];\n  const copyBtns = document.querySelectorAll('.copy');\n  copyBtns[0] && copyBtns[0].setAttribute('data-copy', b.clabe);\n  copyBtns[1] && copyBtns[1].setAttribute('data-copy', b.cuenta);\n  copyBtns[2] && copyBtns[2].setAttribute('data-copy', b.tarjeta.replace(/\\s+/g,''));\n\n  // copy behavior\n  const live = document.getElementById('liveRegion');\n  copyBtns.forEach(function(btn){\n    btn.addEventListener('click', function(){\n      const val = btn.getAttribute('data-copy') || '';\n      const done = function(){\n        const label = btn.querySelector('span');\n        const prev = label ? label.textContent : '';\n        btn.classList.add('is-done');\n        if (label) label.textContent = 'Copiado';\n        if (live) live.textContent = 'Copiado: ' + val;\n        setTimeout(function(){ btn.classList.remove('is-done'); if (label) label.textContent = prev; }, 1500);\n      };\n      if (navigator.clipboard && navigator.clipboard.writeText) {\n        navigator.clipboard.writeText(val).then(done).catch(fallback);\n      } else { fallback(); }\n      function fallback(){\n        const ta = document.createElement('textarea');\n        ta.value = val; ta.style.position = 'fixed'; ta.style.opacity = '0';\n        document.body.appendChild(ta); ta.focus(); ta.select();\n        try { document.execCommand('copy'); } catch(e){}\n        document.body.removeChild(ta); done();\n      }\n    });\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
